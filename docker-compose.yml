services:
  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: qr-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-qrcode}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-qrcode}
      PGTZ: 'UTC'
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-qrcode}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qr-network
    restart: unless-stopped

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: ${REDIS_IMAGE:-redis:8-alpine}
    container_name: qr-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'redis-cli -a ${REDIS_PASSWORD:-redis123} --no-auth-warning ping | grep PONG',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qr-network
    restart: unless-stopped

  # ============================================================================
  # NestJS Application
  # ============================================================================
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: qr-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-qrcode}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-qrcode}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}

      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      JWT_ACCESS_TOKEN_EXPIRES_IN: ${JWT_ACCESS_TOKEN_EXPIRES_IN:-15m}
      JWT_REFRESH_TOKEN_EXPIRES_IN: ${JWT_REFRESH_TOKEN_EXPIRES_IN:-7d}
      # App
      NODE_ENV: production
      PORT: ${PORT:-3000}
      APP_NAME: ${APP_NAME:-QR Code Generator}
      APP_VERSION: ${APP_VERSION:-1.0.0}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-debug}

      # GeoIP
      GEOIP_DB_PATH: /app/data/geoip/GeoLite2-City.mmdb
    volumes:
      - geoip_data:/app/data/geoip:ro
    command: sh ./start.sh
    ports:
      - '${PORT:-3000}:3000'
    networks:
      - qr-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    stdin_open: true
    tty: true

  # ============================================================================
  # GeoIP Update - MaxMind GeoLite2 auto-updater
  # ============================================================================
  geoipupdate:
    image: ghcr.io/maxmind/geoipupdate:latest
    container_name: qr-geoipupdate
    environment:
      GEOIPUPDATE_ACCOUNT_ID: ${MAXMIND_ACCOUNT_ID}
      GEOIPUPDATE_LICENSE_KEY: ${MAXMIND_LICENSE_KEY}
      GEOIPUPDATE_EDITION_IDS: GeoLite2-City
      GEOIPUPDATE_FREQUENCY: 168
    volumes:
      - geoip_data:/usr/share/GeoIP
    networks:
      - qr-network
    restart: unless-stopped

  # ============================================================================
  # Redis Commander - Redis Visualization (Optional)
  # ============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: qr-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-redis123}
    ports:
      - '${REDIS_COMMANDER_PORT:-8081}:8081'
    networks:
      - qr-network
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-qrcodes_postgres_data}
    driver: local
  redis_data:
    name: ${REDIS_VOLUME_NAME:-qrcodes_redis_data}
    driver: local
  geoip_data:
    name: ${GEOIP_VOLUME_NAME:-qrcodes_geoip_data}
    driver: local

networks:
  qr-network:
    driver: bridge
